<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🛒 Your Shopping Cart</h1>
        </div>
    </header>

    <div class="container">
        <a href="index.html" style="text-decoration: none; color: #667eea; font-size: 1.1rem;">← Continue Shopping</a>
        
        <div id="cartItems" style="margin-top: 30px;"></div>
        
        <div id="totalAmount" class="total"></div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn btn-primary" style="padding: 15px 40px; font-size: 1.3rem;" 
                    onclick="checkout()">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <script>
        async function loadCart() {
            try {
                const response = await fetch('/api/cart');
                const cart = await response.json();
                const container = document.getElementById('cartItems');
                let total = 0;

                if (cart.length === 0) {
                    container.innerHTML = "<h2>Your cart is empty 😔</h2>";
                    document.getElementById('totalAmount').innerHTML = '';
                    return;
                }

                let html = '';

                cart.forEach(item => {
                    const itemTotal = item.book.price * item.quantity;
                    total += itemTotal;

                    html += `
                        <div class="cart-item">
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <img src="${item.book.imageUrl}" style="width: 80px; height: 100px; object-fit: cover; border-radius: 8px;">
                                <div>
                                    <h3>${item.book.title}</h3>
                                    <p>by ${item.book.author}</p>
                                    <p>₹${item.book.price} × ${item.quantity}</p>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <p style="font-size: 1.4rem; font-weight: bold;">₹${itemTotal.toFixed(2)}</p>
                                <button class="btn btn-danger" onclick="removeFromCart(${item.book.id})">
                                    Remove
                                </button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                document.getElementById('totalAmount').innerHTML = `
                    <h2>Total Amount: ₹${total.toFixed(2)}</h2>
                `;

            } catch (error) {
                console.error(error);
            }
        }

        async function removeFromCart(bookId) {
            await fetch(`/api/cart/${bookId}`, { method: 'DELETE' });
            loadCart();   // Refresh cart
        }

        async function checkout() {
           if (confirm("Place this order?")) {
                await fetch('/api/checkout', { method: 'POST' });
                window.location.href = "confirmation.html";
            }
        }

        window.onload = loadCart;
    </script>
</body>
</html>
